name: 构建APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Android Build
        uses: appledeluxe/android-github-actions-build@v1.0.0
        with:
          project-path: './fairyalliancesmartphoneanswer'
          commands: 'assembleDebug'
