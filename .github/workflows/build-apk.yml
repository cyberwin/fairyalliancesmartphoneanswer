name: 构建0419-19 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fairyalliancesmartphoneanswer  # 必须！你项目套了两层

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 重点：直接系统安装 gradle，完全不用 gradlew
      - name: 安装 Gradle
        run: sudo apt update && sudo apt install gradle -y

      # 直接编译！不依赖任何项目内工具
      - name: 编译 APK
        run: gradle assembleDebug

      # 上传 APK
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: my-apk
          path: fairyalliancesmartphoneanswer/app/build/outputs/apk/debug/*.apk
