name: Build & Upload to Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ==============================================
      # ✅ 在这里自动随机生成签名文件（全程自动）
      # ==============================================
      - name: Generate random keystore
        run: |
          cd fairyalliancesmartphoneanswer
          keytool -genkey -v \
            -keystore app/keystore.jks \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -storepass release \
            -keypass release \
            -dname "CN=AutoGenerated, OU=Auto, O=Auto, L=Auto, S=Auto, C=CN"

      # ==============================================
      # ✅ 自动写入签名配置
      # ==============================================
      - name: Write signing config
        run: |
          cd fairyalliancesmartphoneanswer
          echo "KEYSTORE_FILE=keystore.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=release" >> local.properties
          echo "KEY_ALIAS=release" >> local.properties
          echo "KEY_PASSWORD=release" >> local.properties

      - name: Make gradlew executable
        run: |
          cd fairyalliancesmartphoneanswer
          chmod +x ./gradlew

      - name: Build signed Release APK
        run: |
          cd fairyalliancesmartphoneanswer
          ./gradlew assembleRelease

      - name: Create Version Tag
        id: tag
        run: echo "tag=v$(date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "FairyAlliance 智能接听 ${{ steps.tag.outputs.tag }}"
          body: "自动构建版本"
          files: fairyalliancesmartphoneanswer/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}