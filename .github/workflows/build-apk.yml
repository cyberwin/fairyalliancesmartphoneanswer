name: 构建2026-04-19-132APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fairyalliancesmartphoneanswer  # 进入正确的项目层

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: 编译 APK
        run: gradle assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/build/outputs/apk/debug/*.apk"
