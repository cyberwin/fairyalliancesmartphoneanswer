name: 构建 APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Gradle
        run: sudo apt update && sudo apt install gradle -y

      - name: 开始编译 APK
        run: gradle assembleDebug

      - name: 上传 APK 可供下载
        uses: actions/upload-artifact@v4
        with:
          name: my-apk
          path: "**/*.apk"
