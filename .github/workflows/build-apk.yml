name: 构建APK177

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Gradle 8.5
        run: |
          sudo apt remove -y gradle
          sudo apt update
          sudo apt install -y wget unzip
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          sudo mv gradle-8.5 /opt/gradle
          sudo ln -s /opt/gradle/bin/gradle /usr/bin/gradle

      - name: 编译 APK
        run: |
          cd fairyalliancesmartphoneanswer
          gradle assembleDebug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "fairyalliancesmartphoneanswer/app/build/outputs/apk/debug/*.apk"
