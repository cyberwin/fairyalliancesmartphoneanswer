name: 构建2026-04-19-109APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 安装正确版本的 Gradle（手动安装，不依赖系统）
      - name: 安装 Gradle 8.2
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          sudo mv gradle-8.2 /opt/gradle
          sudo ln -s /opt/gradle/bin/gradle /usr/bin/gradle

      # 2. 进入你的项目目录（双层目录）
      - name: 进入项目目录
        run: cd fairyalliancesmartphoneanswer

      # 3. 编译
      - name: 编译APK
        run: |
          cd fairyalliancesmartphoneanswer
          gradle assembleDebug

      # 4. 上传APK
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "fairyalliancesmartphoneanswer/app/build/outputs/apk/debug/*.apk"
