name: 构建APK145

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 设置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 👇 这一句自动处理所有 Gradle 环境，不需要你有 gradlew
      - name: 执行构建
        run: |
          cd fairyalliancesmartphoneanswer
          gradle assembleDebug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: my-apk
          path: "**/*.apk"
