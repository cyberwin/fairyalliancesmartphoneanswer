name: 构建APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 安装正确版本 Gradle
      - name: Install Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      # 2. 直接编译（不用cd多层！）
      - name: 编译 APK
        run: gradle assembleDebug

      # 3. 上传APK
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/build/outputs/apk/debug/*.apk"
