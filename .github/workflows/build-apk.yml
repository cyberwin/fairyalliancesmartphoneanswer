name: 构建APK188

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔥 核心：直接用系统 gradle，不装、不删、不创建链接！
      - name: 编译 APK
        run: |
          cd fairyalliancesmartphoneanswer
          gradle assembleDebug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "fairyalliancesmartphoneanswer/app/build/outputs/apk/debug/*.apk"
