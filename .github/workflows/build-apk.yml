name: Build APK199

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build
        run: |
          cd fairyalliancesmartphoneanswer
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: fairyalliancesmartphoneanswer/app/build/outputs/apk/debug/*.apk
