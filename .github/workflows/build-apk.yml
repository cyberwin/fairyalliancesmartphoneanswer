name: Build APK166

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug
          build-root-directory: fairyalliancesmartphoneanswer

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: fairyalliancesmartphoneanswer/app/build/outputs/apk/debug/*.apk
